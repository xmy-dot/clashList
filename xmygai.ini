[custom]

;======================
; 规则集
;======================

ruleset=🎯 全球直连,[]GEOSITE,CN
ruleset=🎯 全球直连,[]GEOIP,CN

ruleset=🎯 xmydirect,https://raw.githubusercontent.com/xmy-dot/clashList/refs/heads/main/xmydirect.list
ruleset=🍃 xmyrule,https://raw.githubusercontent.com/xmy-dot/clashList/refs/heads/main/xmyrule.list
ruleset=🤖 OpenAI,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.list
ruleset=🎥 Netflix,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.list
ruleset=🎵 TikTok,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TikTok/TikTok.list
ruleset=🍀 Google,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.list
ruleset=👨🏿‍💻 GitHub,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.list
ruleset=🪟 Microsoft,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Microsoft/Microsoft.list
ruleset=🎮 Steam,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Steam/Steam.list

ruleset=🌍 国外流量,[]GEOSITE,geolocation-!cn
ruleset=🐟 漏网之鱼,[]FINAL

;======================
; 主策略组
;======================

custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🔯 故障转移`[]🌐 负载均衡`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇺🇲 美国节点`[]🌍 其他地区`[]🐸 手动切换`[]DIRECT

custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT

;======================
; 功能策略组
;======================

custom_proxy_group=🎯 xmydirect`select`[]DIRECT`[]🚀 节点选择`[]🐸 手动切换
custom_proxy_group=🍃 xmyrule`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 加坡节点`[]🇺🇲 美国节点`[]🐸 手动切换`[]DIRECT
custom_proxy_group=🤖 OpenAI`select`[]🌐 AI优选`[]🇺🇲 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🚀 节点选择
custom_proxy_group=🎥 Netflix`select`[]🎥 奈飞节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇺🇲 美国节点`[]🚀 节点选择
custom_proxy_group=🎵 TikTok`select`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🚀 节点选择

custom_proxy_group=🍀 Google`select`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇺🇲 美国节点
custom_proxy_group=👨🏿‍💻 GitHub`select`[]♻️ 自动选择`[]🚀 节点选择
custom_proxy_group=🪟 Microsoft`select`[]DIRECT`[]♻️ 自动选择`[]🚀 节点选择
custom_proxy_group=🎮 Steam`select`[]DIRECT`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 加坡节点`[]🐸 手动切换

;======================
; 节点池（核心）
;======================

custom_proxy_group=🐸 手动切换`select`.*

custom_proxy_group=♻️ 自动选择`url-test`^(?!.*(流量|剩余|到期|官网|倍率|0\.5x|0\.1x|2x|3x|4x)).*$`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🔯 故障转移`fallback`^(?!.*(流量|剩余|倍率|0\.5x|0\.1x)).*$`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🌐 负载均衡`load-balance`^(?!.*(流量|剩余|倍率)).*$`http://www.gstatic.com/generate_204`300,,50

;======================
; 地区节点（稳定版）
;======================

custom_proxy_group=🇭🇰 香港节点`url-test`^(?=.*(香港|HK|Hong Kong|HKT))(?!.*(家宽|游戏|倍率|0\.5x|0\.1x)).*$`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🇯🇵 日本节点`url-test`^(?=.*(日本|东京|大阪|JP|Japan))(?!.*(家宽|游戏|倍率)).*$`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🇸🇬 新加坡节点`url-test`^(?=.*(新加坡|SG|Singapore))(?!.*(家宽|游戏|倍率)).*$`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🇺🇲 美国节点`url-test`(美|US|United States|洛杉矶|硅谷|纽约|西雅图)`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🌍 其他地区`select`^(?!.*(香港|HK|日本|JP|新加坡|SG|美国|US)).*$

;======================
; 专用节点
;======================

custom_proxy_group=🎥 奈飞节点`url-test`(Netflix|NF|奈飞|解锁)`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🌐 AI优选`url-test`(ChatGPT|OpenAI|GPT|Gemini|Claude|AI)`http://www.gstatic.com/generate_204`300,,50

;======================
; 规则生成
;======================

enable_rule_generator=true
overwrite_original_rules=true
